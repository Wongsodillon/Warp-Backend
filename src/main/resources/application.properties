spring.application.name=warp-backend
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.leak-detection-threshold=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=1000ms
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=150
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.min-idle=20
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.cache.type=redis

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI}

application.short-url.secret=${SHORT_URL_SECRET}
application.domain.url=${APPLICATION_DOMAIN_URL}
application.frontend.url=${APPLICATION_FRONTEND_URL}
application.reserved.short-url=not-found-url,expired,password

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=1

resilience4j.circuitbreaker.instances.redisCache.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.redisCache.sliding-window-size=20
resilience4j.circuitbreaker.instances.redisCache.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.redisCache.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.redisCache.permitted-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.redisCache.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.redisCache.register-health-indicator=true

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=10ms,25ms,50ms,100ms,200ms
management.metrics.distribution.percentiles-histogram.hikaricp=true
management.metrics.distribution.percentiles.hikaricp=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.lettuce=true
management.metrics.distribution.percentiles.lettuce=0.5,0.95,0.99
management.metrics.tags.application=warp-backend
server.tomcat.mbeanregistry.enabled=true

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false