spring.application.name=warp-backend
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=1000ms
spring.cache.type=redis

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI}

application.short-url.secret=${SHORT_URL_SECRET}
application.domain.url=${APPLICATION_DOMAIN_URL}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=10ms,25ms,50ms,100ms,200ms
management.metrics.distribution.percentiles-histogram.hikaricp=true
management.metrics.distribution.percentiles.hikaricp=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.lettuce=true
management.metrics.distribution.percentiles.lettuce=0.5,0.95,0.99
management.metrics.tags.application=warp-backend
server.tomcat.mbeanregistry.enabled=true