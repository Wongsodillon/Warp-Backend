spring.application.name=warp-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/warp-backend
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=true

application.short-url.secret=12345
application.domain.url=http://localhost:8080
application.frontend.url=http://localhost:3001

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/placeholder-jwks

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.kafka.bootstrap-servers=localhost:9092
spring.session.store-type=none

spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=1000ms